<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agropecuaria Jireh</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="toastHost" class="toast-host" aria-live="polite"></div>

    <section id="loginView" class="login-shell">
      <div class="login-panel">
        <div class="login-brand">
          <div class="brand-mark" aria-hidden="true">
            <span>AJ</span>
          </div>
          <div>
            <h1>Agropecuaria Jireh</h1>
            <p>Más que alimento, es cuidado para tus mascotas.</p>
          </div>
        </div>

        <form id="loginForm" class="form-grid" autocomplete="off">
          <div class="login-copy span-4">
            <strong>Acceso interno</strong>
            <span>Ingrese sus credenciales asignadas para administrar productos, inventario y ventas.</span>
          </div>
          <label>
            Usuario
            <input id="loginUser" autocomplete="off" placeholder="Ingrese su usuario" required />
          </label>
          <label>
            Contraseña
            <input id="loginPass" type="password" autocomplete="new-password" placeholder="Ingrese su contraseña" required />
          </label>
          <button type="submit" class="btn primary full">Ingresar</button>
        </form>
      </div>
    </section>

    <div id="appView" class="app-shell hidden">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-mark small" aria-hidden="true"><span>AJ</span></div>
          <div>
            <strong>Agropecuaria Jireh</strong>
            <small>Más que alimento, es cuidado para tus mascotas.</small>
          </div>
        </div>
        <nav id="navMenu" class="nav-menu" aria-label="Módulos"></nav>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <button id="menuToggle" class="icon-btn" title="Abrir menú" aria-label="Abrir menú">
            <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16" /></svg>
          </button>
          <div class="search-wrap">
            <svg viewBox="0 0 24 24"><path d="m21 21-4.2-4.2M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" /></svg>
            <input id="quickSearch" placeholder="Buscar rápido productos, facturas o clientes" />
          </div>
          <button id="notificationBtn" class="icon-btn notify" title="Notificaciones" aria-label="Notificaciones">
            <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0" /></svg>
            <span id="notificationCount">0</span>
          </button>
          <div class="user-chip">
            <span id="currentUserName">Usuario</span>
            <small id="currentUserRole">Rol</small>
          </div>
          <button id="logoutBtn" class="btn ghost">Salir</button>
        </header>

        <section id="content" class="content"></section>
      </main>
    </div>

    <dialog id="modal" class="modal">
      <form method="dialog">
        <button class="icon-btn modal-close" value="cancel" aria-label="Cerrar">
          <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12" /></svg>
        </button>
      </form>
      <div id="modalBody"></div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
